services:
  - type: web
    name: actionrail-finance
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ACTIONRAIL_SESSION_SECRET
        generateValue: true
